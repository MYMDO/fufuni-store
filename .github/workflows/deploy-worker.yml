name: Deploy Merchant Worker

on:
  push:
    branches: [main]
    paths:
      - 'apps/merchant/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/merchant/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/merchant

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production
          workingDirectory: apps/merchant
        env:
          MERCHANT_PK: ${{ secrets.MERCHANT_PK }}
          MERCHANT_SK: ${{ secrets.MERCHANT_SK }}
          STORE_NAME: ${{ secrets.STORE_NAME }}
          STORE_URL: ${{ secrets.STORE_URL }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
